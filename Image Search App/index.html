<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Search App</title>
  <link rel="stylesheet" href="./style.css">

  <style>
    /* CSS resets and variables for theme consistency */
    :root {
      --bg-dark: #0f0f0f;
      --card-bg: #1f1f1f;
      --text-main: #f1f1f1;
      --text-sub: #aaa;
      --accent-color: #ff0000; /* Red accents like YouTube */
      --accent-hover: #cc0000;
      --input-border: #303030;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Roboto', sans-serif;
      padding: 20px;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 30px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.8rem;
    }

    .version-selector {
      background-color: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--input-border);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
    }

    /* Search Container Styling (Will be used as we step up) */
    .search-wrapper {
      display: flex;
      gap: 10px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .search-input {
      flex: 1;
      background-color: #121212;
      color: var(--text-main);
      border: 1px solid var(--input-border);
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
    }

    .search-input:focus {
      border-color: #3ea6ff; /* Focus border color */
    }

    .btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    /* Cards Grid Layout */
    .grid-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* YouTube style card structures */
    .image-card {
      background-color: transparent;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
    }

    .thumbnail-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      border-radius: 12px;
      overflow: hidden;
      background-color: #333;
    }

    .thumbnail-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .image-card:hover .thumbnail-wrapper img {
      transform: scale(1.05);
    }

    .card-info {
      display: flex;
      gap: 12px;
    }

    .creator-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #555;
      object-fit: cover;
    }

    .card-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: bold;
      line-height: 1.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text-main);
    }

    .card-creator {
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    .card-stats {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
  </style>
  <script src="./script.js"></script>
</head>
<body>

  <header>
    <div class="top-bar">
      <h1>📷 Image Search Hub</h1>
      <select id="versionSelect" class="version-selector">
        <option value="v1">Version 1: Static OOP</option>
        <option value="v2" disabled>Version 2: Local Search (Locked)</option>
        <option value="v3" disabled>Version 3: Fetch API (Locked)</option>
        <option value="v4" disabled>Version 4: Pro Features (Locked)</option>
      </select>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search images..." readonly>
      <button class="btn" id="searchBtn" disabled>Search</button>
    </div>
  </header>

  <main class="grid-container" id="gridContainer"></main>

  
</body>
</html>
