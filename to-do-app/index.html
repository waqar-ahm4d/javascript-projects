<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOP JavaScript Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="todo-container">
    <header>
      <h1>Task Manager</h1>
      <p>Built with Object-Oriented JavaScript</p>
    </header>

    <form id="todo-form" class="todo-form">
      <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off">
      <button type="submit">Add Task</button>
    </form>

    <ul id="todo-list" class="todo-list">
      <!-- Tasks will be dynamically rendered here by the TodoApp class -->
    </ul>
  </main>

  <!-- <script src="oop.js"></script> -->
  <script src="functional.js"></script>
  <!-- <script src="simple.js"></script> -->
</body>
</html>
