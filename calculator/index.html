<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator Masterclass</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="calculator">
      <div class="display">
        <div class="history"></div>

        <div class="current-value">0</div>
      </div>

      <div class="keys">
        <!-- Row 1 -->

        <button class="key key--function" data-type="clear" data-value="clear">
          AC
        </button>

        <button
          class="key key--function"
          data-type="operator"
          data-value="divide"
        >
          ÷
        </button>

        <button
          class="key key--function"
          data-type="operator"
          data-value="multiply"
        >
          x
        </button>

        <button
          class="key key--function"
          data-type="operator"
          data-value="subtract"
        >
          -
        </button>

        <!-- Row 2 -->

        <button class="key" data-type="number" data-value="7">7</button>
        <button class="key" data-type="number" data-value="8">8</button>
        <button class="key" data-type="number" data-value="9">9</button>

        <button class="key key--function" data-type="operator" data-value="add">
          +
        </button>

        <!-- Row 3 -->

        <button class="key" data-type="number" data-value="4">4</button>
        <button class="key" data-type="number" data-value="5">5</button>
        <button class="key" data-type="number" data-value="6">6</button>
        <button class="key" data-type="sign">±</button>
        
        <!-- Row 4 -->
        
        <button class="key" data-type="number" data-value="1">1</button>
        <button class="key" data-type="number" data-value="2">2</button>
        <button class="key" data-type="number" data-value="3">3</button>
        <button
          class="key key--equal"
          data-type="calculate"
          data-value="equals"
        >
          =
        </button>

        <!-- Row 5 -->

        <button class="key" data-type="number" data-value="0">
          0
        </button>

        <button class="key" data-type="decimal" data-value=".">
          .
        </button>
        <button class="key" data-type="percent">%</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
